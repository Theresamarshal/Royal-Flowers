<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Royal Flowers Admin</title>

<style>

body{
font-family: Arial, sans-serif;
background:#fff5f8;
margin:0;
padding:30px;
}

h1{
color:#d63384;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
}

/* FORM CARD */

.form-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:40px;
}

.form-card h2{
color:#d63384;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

.form-group input,
.form-group textarea,
.form-group select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
background:#d63384;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#b0256c;
}

/* PRODUCTS GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.product-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
text-align:center;
}

.product-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.product-card h3{
color:#d63384;
margin:5px 0;
}

.price{
font-weight:bold;
color:#444;
margin-bottom:10px;
}

.delete-btn{
background:#ff4d4d;
}

.delete-btn:hover{
background:#d93636;
}

.update-btn{
background:#28a745;
margin-right:5px;
}

.update-btn:hover{
background:#218838;
}

/* Modal Styles */
.modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background-color:rgba(0,0,0,0.5);
}

.modal-content{
background-color:#fefefe;
margin:5% auto;
padding:20px;
border-radius:12px;
width:90%;
max-width:500px;
}

.close{
color:#aaa;
float:right;
font-size:28px;
font-weight:bold;
cursor:pointer;
}

.close:hover{
color:black;
}

</style>
</head>


<body>

<div class="container">

<h1>🌸 Royal Flowers Admin</h1>

<!-- ADD PRODUCT -->

<div class="form-card">

<h2>Add Product</h2>

<form id="productForm">

<div class="form-group">
<input type="text" id="productCode" placeholder="Product Code (Auto-generated if empty)">
</div>

<div class="form-group">
<input type="text" id="name" placeholder="Product Name" required>
</div>

<div class="form-group">
<select id="category" required>
    <option value="">Select Category</option>
    <option value="Anniversary Flowers">Anniversary Flowers</option>
    <option value="Birthday Flowers">Birthday Flowers</option>
    <option value="Bouquet">Bouquet</option>
    <option value="Bridal Bouquet">Bridal Bouquet</option>
    <option value="Cake">Cake</option>
    <option value="Congratulations">Congratulations</option>
    <option value="Funeral/Sympathy">Funeral/Sympathy</option>
    <option value="Valentine's Day flowers">Valentine's Day flowers</option>
    <option value="Wedding">Wedding</option>
    <option value="Welcome Flower">Welcome Flower</option>
</select>
</div>

<div class="form-group" style="display: flex; gap: 10px;">
    <input type="number" id="priceSmall" placeholder="Price (S)" required>
    <input type="number" id="priceMedium" placeholder="Price (M)" required>
    <input type="number" id="priceLarge" placeholder="Price (L)" required>
</div>

<div class="form-group">
<textarea id="description" placeholder="Description"></textarea>
</div>

<div class="form-group">
<textarea id="productDetails" placeholder="Product Details"></textarea>
</div>

<div class="form-group">
<input type="file" id="image" required>
</div>

<button type="submit">Add Product</button>

</form>

</div>


<!-- MANAGE PRODUCTS -->

<h2 style="color:#d63384;">Manage Products</h2>

<div class="products" id="adminProductList"></div>

<!-- Edit Product Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h2>Update Product</h2>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label style="font-size: 11px; color: #666;">Product Code</label>
                <input type="text" id="editProductCode" placeholder="Product Code" required>
            </div>
            <div class="form-group">
                <input type="text" id="editName" placeholder="Product Name" required>
            </div>
            <div class="form-group">
                <select id="editCategory" required>
                    <option value="">Select Category</option>
                    <option value="Anniversary Flowers">Anniversary Flowers</option>
                    <option value="Birthday Flowers">Birthday Flowers</option>
                    <option value="Bouquet">Bouquet</option>
                    <option value="Bridal Bouquet">Bridal Bouquet</option>
                    <option value="Cake">Cake</option>
                    <option value="Congratulations">Congratulations</option>
                    <option value="Funeral/Sympathy">Funeral/Sympathy</option>
                    <option value="Valentine's Day flowers">Valentine's Day flowers</option>
                    <option value="Wedding">Wedding</option>
                    <option value="Welcome Flower">Welcome Flower</option>
                </select>
            </div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label style="font-size: 11px; color: #666;">Small</label><input type="number" id="editPriceSmall" placeholder="S" required></div>
                <div style="flex: 1;"><label style="font-size: 11px; color: #666;">Medium</label><input type="number" id="editPriceMedium" placeholder="M" required></div>
                <div style="flex: 1;"><label style="font-size: 11px; color: #666;">Large</label><input type="number" id="editPriceLarge" placeholder="L" required></div>
            </div>
            <div class="form-group">
                <textarea id="editDescription" placeholder="Description"></textarea>
            </div>
            <div class="form-group">
                <textarea id="editProductDetails" placeholder="Product Details"></textarea>
            </div>
            <div class="form-group">
                <input type="file" id="editImage">
                <small>Leave empty to keep current image</small>
            </div>
            <button type="submit">Update Product</button>
        </form>
    </div>
</div>

</div>



<script>

/* ADD PRODUCT */

document.getElementById("productForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData();

formData.append("productCode",document.getElementById("productCode").value);
formData.append("name",document.getElementById("name").value);
formData.append("category",document.getElementById("category").value);
formData.append("priceSmall",document.getElementById("priceSmall").value);
formData.append("priceMedium",document.getElementById("priceMedium").value);
formData.append("priceLarge",document.getElementById("priceLarge").value);
formData.append("description",document.getElementById("description").value);
formData.append("productDetails",document.getElementById("productDetails").value);
formData.append("image",document.getElementById("image").files[0]);

const res = await fetch("/api/products",{
method:"POST",
body:formData
});
if (!res.ok) {
    const errorData = await res.json().catch(() => ({ error: "Unknown Network Error" }));
    alert("Failed to add product! Server says: " + errorData.error);
    return;
}

alert("Product Added 🌸");

loadAdminProducts();

});



/* LOAD PRODUCTS */

async function loadAdminProducts(){

const res = await fetch("/api/products");

const products = await res.json();

const container = document.getElementById("adminProductList");

container.innerHTML="";

products.forEach(product=>{

const div=document.createElement("div");

div.className="product-card";

div.innerHTML=`

<img src="${product.image}" alt="${product.name}">

<h3>${product.name}</h3>

<div style="font-size: 0.85rem; color: #d63384; font-weight: 600; margin-bottom: 5px;">
    SKU: ${product.productCode || 'N/A'}
</div>

<div class="price" style="font-size: 0.9rem; margin-bottom: 5px;">
    S: ₹${product.priceSmall || 'N/A'} | M: ₹${product.priceMedium || product.price || 'N/A'} | L: ₹${product.priceLarge || 'N/A'}
</div>

<div style="font-size: 0.8rem; color: #666; margin-bottom: 5px; max-height: 40px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
    <strong>Desc:</strong> ${product.description || 'No description'}
</div>

<div style="font-size: 0.8rem; color: #666; margin-bottom: 5px; max-height: 40px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
    <strong>Details:</strong> ${product.productDetails || 'N/A'}
</div>

<div style="margin-top:10px;">
    <button class="update-btn" onclick="editProduct('${product._id}')">
        Update
    </button>
    <button class="delete-btn" onclick="deleteProduct('${product._id}')">
        Delete
    </button>
</div>

`;

container.appendChild(div);

});

}

loadAdminProducts();



/* DELETE PRODUCT */

async function deleteProduct(id){

if(!confirm("Delete product?")) return;

await fetch("/api/products/"+id,{
method:"DELETE"
});

loadAdminProducts();

}

/* EDIT PRODUCT */

async function editProduct(id){

const res = await fetch("/api/products");
const products = await res.json();
const product = products.find(p => p._id === id);

if(product){
document.getElementById("editId").value = product._id;
document.getElementById("editProductCode").value = product.productCode || "";
document.getElementById("editName").value = product.name;
document.getElementById("editCategory").value = product.category;
document.getElementById("editPriceSmall").value = product.priceSmall || "";
document.getElementById("editPriceMedium").value = product.priceMedium || product.price || "";
document.getElementById("editPriceLarge").value = product.priceLarge || "";
document.getElementById("editDescription").value = product.description;
document.getElementById("editProductDetails").value = product.productDetails || "";

document.getElementById("editModal").style.display = "block";
}

}

function closeEditModal(){
document.getElementById("editModal").style.display = "none";
}

document.getElementById("editForm").addEventListener("submit", async function(e){

e.preventDefault();

const id = document.getElementById("editId").value;
const formData = new FormData();

formData.append("productCode", document.getElementById("editProductCode").value);
formData.append("name", document.getElementById("editName").value);
formData.append("category", document.getElementById("editCategory").value);
formData.append("priceSmall", document.getElementById("editPriceSmall").value);
formData.append("priceMedium", document.getElementById("editPriceMedium").value);
formData.append("priceLarge", document.getElementById("editPriceLarge").value);
formData.append("description", document.getElementById("editDescription").value);
formData.append("productDetails", document.getElementById("editProductDetails").value);

const imageFile = document.getElementById("editImage").files[0];
if(imageFile){
formData.append("image", imageFile);
}

await fetch(`/api/products/${id}`,{
method:"PUT",
body:formData
});

alert("Product Updated 🌸");

closeEditModal();
loadAdminProducts();

});

</script>

</body>

</html>
