<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Royal Flowers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8e8f0 0%, #fce4ec 50%, #f8bbd0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(214, 51, 132, 0.15);
            text-align: center;
        }

        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #d63384;
            margin-bottom: 8px;
        }

        .login-logo i { margin-right: 10px; }

        .login-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d63384;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 13px 15px 13px 42px;
            border: 2px solid #f0e0e8;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: #d63384;
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d63384, #c2185b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
        }

        .error-msg {
            background: #fff0f3;
            border: 1px solid #ffb3c6;
            color: #c2185b;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link:hover { color: #d63384; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-spa"></i> Royal Flowers
        </div>
        <p class="login-subtitle">Admin Panel — Authorised Access Only</p>

        <div class="error-msg" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i> Incorrect username or password.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter admin password" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
            </button>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            const res = await fetch('/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                window.location.href = '/admin';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
