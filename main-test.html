<!DOCTYPE html>
<html>
<head>
    <title>Main Page Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .refresh-btn { background: #28a745; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .product-card h3 { margin: 10px 0; color: #333; }
        .price { font-weight: bold; color: #28a745; }
        .no-products { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <h1>Royal Flowers - Main Shop</h1>
    
    <div class="header">
        <div>Showing <span id="productCount">0</span> products</div>
        <button id="refreshBtn" class="refresh-btn" onclick="loadProducts()">
            🔄 Refresh
        </button>
    </div>

    <div class="product-grid" id="productGrid">
        Loading products...
    </div>

    <script>
        console.log("Main page script loaded!");
        
        async function loadProducts(){
            console.log("Loading products...");
            
            try {
                const response = await fetch("http://localhost:5000/api/products?t=" + Date.now());
                const products = await response.json();
                
                console.log("Products:", products);
                
                const container = document.getElementById("productGrid");
                const countElement = document.getElementById("productCount");
                const refreshBtn = document.getElementById("refreshBtn");
                
                if(refreshBtn) {
                    refreshBtn.innerHTML = '🔄 Refreshing...';
                    refreshBtn.disabled = true;
                }
                
                container.innerHTML = "";
                
                if(products.length === 0){
                    container.innerHTML = '<p class="no-products">No products available.</p>';
                } else {
                    products.forEach(product => {
                        const div = document.createElement("div");
                        div.className = "product-card";
                        div.innerHTML = `
                            <img src="http://localhost:5000${product.image}" alt="${product.name}" onerror="this.src='https://picsum.photos/seed/flower/300/200'">
                            <h3>${product.name}</h3>
                            <p class="price">₹${product.price}</p>
                            <p>${product.description || 'No description'}</p>
                        `;
                        container.appendChild(div);
                    });
                }
                
                if(countElement) countElement.textContent = products.length;
                
                if(refreshBtn) {
                    setTimeout(() => {
                        refreshBtn.innerHTML = '🔄 Refresh';
                        refreshBtn.disabled = false;
                    }, 500);
                }
                
            } catch(error) {
                console.error("Error:", error);
                document.getElementById("productGrid").innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        // Load on page load
        loadProducts();
        
        // Auto-refresh every 3 seconds
        setInterval(loadProducts, 3000);
    </script>
</body>
</html>
